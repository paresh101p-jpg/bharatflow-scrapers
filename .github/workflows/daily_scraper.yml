name: Daily Leader Data Scraper

on:
  schedule:
    # Runs at 18:30 UTC every day, which is exactly 12:00 Midnight IST
    - cron: '30 18 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary pandas requests lxml beautifulsoup4
        
    - name: Run Scraper Script
      env:
        # These should eventually be moved to GitHub Secrets
        DB_HOST: aws-1-ap-south-1.pooler.supabase.com
        DB_PORT: 5432
        DB_NAME: postgres
        DB_USER: postgres.wkhelvyqudzyzbrayyqo
        DB_PASS: g?d5BzZ*/+ExQ*2
      run: |
        # We run the script that we created earlier
        python scrape_all_mps.py
        python scrape_mlas.py
        python update_wiki_desc.py
        python scrape_myneta.py
        
    - name: Notify Status
      run: echo "Scraping job completed successfully at IST Midnight!"
