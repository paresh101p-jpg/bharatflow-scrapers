name: Daily Subsidy Sync (BharatFlow Engine)

on:
  schedule:
    # Runs at 18:30 UTC every day, which is exactly 12:00 AM Midnight IST (Indian Standard Time)
    - cron: '30 18 1 * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync_subsidies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Run Subsidy Scraper
        env:
          # These secrets must be added in GitHub: Settings > Secrets and variables > Actions
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python backend/subsidies_scraper/scraper.py
